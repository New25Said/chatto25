<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>💬 Chat WhatsApp</title>
<link rel="stylesheet" href="styles.css">
<style>
  .unread-dot{ display:inline-block;width:10px;height:10px;background:#2ecc71;border-radius:50%;margin-left:6px; }
  #image-input{ display:inline-block;margin-left:5px; }
  img.message-img{ max-width:200px; max-height:200px; border-radius:8px; margin-top:4px; }
</style>
</head>
<body>

<div id="chat-app">
  <div id="sidebar">
    <div id="sidebar-header">💬 Chat</div>
    <input id="search-contact" placeholder="Buscar..."/>
    <ul id="chat-list"></ul>
    <button id="create-group-btn">Crear Grupo</button>
  </div>

  <div id="chat-panel">
    <div id="chat-header-panel">
      <span id="chat-title">General</span>
      <span id="typing-indicator"></span>
    </div>
    <ul id="messages"></ul>
    <div id="input-area">
      <input id="message-input" placeholder="Escribe un mensaje..." autocomplete="off"/>
      <input type="file" id="image-input"/>
      <button id="send-btn">➤</button>
    </div>
  </div>
</div>

<div id="nickname-modal">
  <input id="username" placeholder="Escribe tu nickname"/>
  <button id="join-btn">Unirse</button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

let nickname = localStorage.getItem("nickname") || "";
let currentChat = "public";
let currentTarget = null;
let allMessages = [];
let unread = {};
let userList = [];

const nicknameModal=document.getElementById("nickname-modal");
const usernameInput=document.getElementById("username");
const joinBtn=document.getElementById("join-btn");
const messages=document.getElementById("messages");
const messageInput=document.getElementById("message-input");
const sendBtn=document.getElementById("send-btn");
const typingIndicator=document.getElementById("typing-indicator");
const chatList=document.getElementById("chat-list");
const chatTitle=document.getElementById("chat-title");
const createGroupBtn=document.getElementById("create-group-btn");
const imageInput=document.getElementById("image-input");

if(!nickname){ nicknameModal.style.display="flex"; } 
else{ socket.emit("set nickname", nickname); }

joinBtn.addEventListener("click", ()=>{
  const name=usernameInput.value.trim();
  if(name){
    nickname=name;
    localStorage.setItem("nickname", nickname);
    nicknameModal.style.display="none";
    socket.emit("set nickname", nickname);
  }
});

function addMessage(msg){
  const li=document.createElement("li");
  li.className="message "+(msg.name===nickname?"you":"other");

  let content;
  if(msg.type==="image") content=`<img class="message-img" src="${msg.data}"/>`;
  else content=`<span class="text">${msg.text}</span>`;

  li.innerHTML=`<span class="name">${msg.name}</span>${content}
                <span class="time">${new Date(msg.time).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</span>`;
  messages.appendChild(li);
  messages.scrollTop=messages.scrollHeight;
}

function renderMessages(){
  messages.innerHTML="";
  allMessages.forEach(msg=>{
    if(currentChat==="public" && msg.type==="public") addMessage(msg);
    else if(currentChat==="private" && msg.type==="private"){
      if((msg.name===nickname && msg.target===currentTarget) ||
         (msg.name===currentTarget && msg.target===nickname)) addMessage(msg);
    }
    else if(currentChat==="group" && msg.type==="group" && msg.target===currentTarget){
      addMessage(msg);
    }
  });
}

function renderChatList(){
  chatList.innerHTML="";
  const generalLi=document.createElement("li");
  generalLi.textContent="General";
  generalLi.className="public";
  generalLi.addEventListener("click",()=>selectChat("public"));
  chatList.appendChild(generalLi);

  userList.forEach(user=>{
    if(user!==nickname){
      const li=document.createElement("li");
      li.textContent=user;
      li.className="contact";
      if(unread[user]){
        const dot=document.createElement("span");
        dot.className="unread-dot";
        li.appendChild(dot);
      }
      li.addEventListener("click",()=>{
        selectChat("private",user);
        unread[user]=0;
        renderChatList();
      });
      chatList.appendChild(li);
    }
  });
});

function selectChat(type,target=null){
  currentChat=type;
  currentTarget=target;
  chatTitle.textContent=target||"General";
  renderMessages();
}

sendBtn.addEventListener("click",()=>{
  const text=messageInput.value.trim();
  if(!text||!nickname) return;
  if(currentChat==="public") socket.emit("chat public",text);
  else if(currentChat==="private") socket.emit("chat private",{target:currentTarget,text});
  else if(currentChat==="group") socket.emit("chat group",{groupName:currentTarget,text});
  messageInput.value="";
});

messageInput.addEventListener("keypress",e=>{
  if(e.key==="Enter") sendBtn.click();
});

messageInput.addEventListener("input",()=>socket.emit("typing",{type:currentChat,target:currentTarget}));
socket.on("typing",name=>{
  if(name!==nickname){
    typingIndicator.textContent=`${name} está escribiendo...`;
    clearTimeout(window.typingTimeout);
    window.typingTimeout=setTimeout(()=>typingIndicator.textContent="",2000);
  }
});

socket.on("chat history",history=>{
  allMessages=history;
  renderMessages();
});

socket.on("chat message",msg=>{
  allMessages.push(msg);
  if(msg.type==="private"){
    const other=(msg.name===nickname?msg.target:msg.name);
    if(currentChat!=="private" || currentTarget!==other) unread[other]=(unread[other]||0)+1;
  }
  renderMessages();
  renderChatList();
});

socket.on("user list",users=>{
  userList=users;
  renderChatList();
});

socket.on("group list",groups=>{
  groups.forEach(group=>{
    const li=document.createElement("li");
    li.textContent=group;
    li.className="group";
    li.addEventListener("click",()=>selectChat("group",group));
    chatList.appendChild(li);
  });
});

createGroupBtn.addEventListener("click",()=>{
  const name=prompt("Nombre del grupo:");
  const members=prompt("Miembros separados por coma:").split(",").map(m=>m.trim());
  if(name&&members.length>0){
    members.push(nickname);
    socket.emit("create group",{groupName:name,members});
  }
});

imageInput.addEventListener("change",()=>{
  const file=imageInput.files[0];
  if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    const dataURL=e.target.result;
    if(currentChat==="public") socket.emit("chat image",{data:dataURL});
    else if(currentChat==="private") socket.emit("chat image",{data:dataURL,target:currentTarget});
    else if(currentChat==="group") socket.emit("chat image",{data:dataURL,target:currentTarget});
  };
  reader.readAsDataURL(file);
});
</script>
</body>
</html>
